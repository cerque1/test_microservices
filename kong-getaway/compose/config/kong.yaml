_format_version: "3.0"
services:
- connect_timeout: 60000
  enabled: true
  host: host.docker.internal
  name: films-api
  plugins:
  - config:
      proto: /usr/local/kong/service-1.films.proto
    enabled: true
    name: grpc-gateway
    protocols:
    - grpc
    - grpcs
    - http
    - https
  port: 9000
  protocol: grpc
  read_timeout: 60000
  retries: 5
  routes:
  - https_redirect_status_code: 426
    name: http-routes
    path_handling: v0
    paths:
    - /api
    plugins:
    - config:
        proto: /usr/local/kong/service-1.films.proto
      enabled: true
      name: grpc-gateway
      protocols:
      - grpc
      - grpcs
      - http
      - https
    preserve_host: false
    protocols:
    - http
    regex_priority: 0
    request_buffering: true
    response_buffering: true
    strip_path: false
  write_timeout: 60000
- connect_timeout: 60000
  enabled: true
  host: host.docker.internal
  name: films-grpc-api
  port: 9111
  protocol: grpc
  read_timeout: 60000
  retries: 5
  routes:
  - https_redirect_status_code: 426
    name: grpc-routes
    path_handling: v0
    paths:
    - /grpc.v1.Service1
    preserve_host: false
    protocols:
    - grpc
    regex_priority: 0
    request_buffering: true
    response_buffering: true
    strip_path: false
  write_timeout: 60000
